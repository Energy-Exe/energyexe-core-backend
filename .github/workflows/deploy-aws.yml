name: Deploy to AWS Fargate

# Builds the production image, pushes to ECR, and forces a new ECS deployment.
# Authenticates to AWS via GitHub OIDC (no stored keys) — the role is defined
# in infra/cicd.tf and trusts only this repo's master branch.

on:
  push:
    branches: [master]
    # Skip deploys for changes that don't affect the app image: docs, Terraform,
    # and CI/cron workflow config (a workflow-only commit shouldn't redeploy the
    # app; a mixed commit with app code still deploys).
    paths-ignore:
      - '**.md'
      - 'infra/**'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch: {}

concurrency:
  group: deploy-aws
  cancel-in-progress: false

permissions:
  id-token: write   # required to request the OIDC token
  contents: read

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: energyexe-core-backend
  ECS_CLUSTER: energyexe
  ECS_SERVICE: energyexe-core-backend
  DEPLOY_ROLE_ARN: arn:aws:iam::580639800175:role/energyexe-core-backend-github-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build --target production -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Force new deployment
        # Task definition points at :latest, so a forced redeploy pulls the
        # image we just pushed. Single-task service => ~1-2 min downtime.
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --query 'service.deployments[0].id' --output text

      - name: Wait for service to stabilize
        run: aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE"
