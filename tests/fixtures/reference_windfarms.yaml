# Reference windfarms for performance-pipeline correctness work.
#
# These five farms span the conditions the Module 5 bugs and Module 1b
# limitations interact with — different capacity factors, currencies,
# multi-unit configurations, data lengths, and known infrastructure events.
#
# Each entry must be re-validated whenever windfarm IDs shift between
# environments (run `python scripts/verify_reference_windfarms.py` after
# database refresh / restore).
#
# Used by:
#   - P0.5  scripts/capture_pipeline_baseline.py (pre-change snapshots)
#   - Layer-2 spec side-by-side comparisons (one-off, gates Milestone A merge)
#   - Layer-3 permanent CI integration test (tests/test_spec_equivalence.py)
#
# Captured baselines: tests/fixtures/baselines/{wf_code}_pre.json (P0.5 output)

reference_windfarms:
  - id: 7197
    code: LUTELANDET
    name: Lutelandet
    class: low_cf_eur_onshore
    rated_mw: 51.3
    currency: EUR
    generation_units: 1
    data_range:
      gen_start: 2021-12-31
      gen_end: 2025-12-31
    notes: |
      The spec reference windfarm — `Config.rated_mw = 51.3` in
      energyexe_pipeline_full.py matches Lutelandet's nameplate exactly.
      No constraint events expected (clean Norwegian onshore baseline).
      Module 5 bug C: baseline_cap_pu_q50 = 0.2706 (spec) vs 0.35 (ours).
      Module 5 bug A: spec slope_pct = 0.34, ours = 0.50 (Q50).
      First windfarm validated in P-1.

  - id: 7210
    code: ROAN
    name: Roan
    class: mid_cf_eur_onshore
    rated_mw: 255.6
    currency: EUR
    generation_units: 1
    data_range:
      gen_start: 2018-11-20
      gen_end: 2025-12-31
    notes: |
      Mid-CF Norwegian inland — clean reference, EUR-priced.
      Multi-year (~7 years) so seasonal_decompose engages fully.
      Expected post-Milestone-A: small drift in slope_pct, no surprise.

  - id: 7371
    code: EAST_ANGLIA_ONE
    name: East Anglia One
    class: high_cf_gbp_offshore_multi_bmu
    rated_mw: 714.0
    currency: GBP
    generation_units: 2  # T_EAAO-1, T_EAAO-2 (ELEXON BMUs)
    data_range:
      gen_start: 2020-07-28
      gen_end: 2026-05-13
    notes: |
      Known Feb-Oct 2024 cable issue per Prioritisation 2026 05 18.docx
      (219 GWh observed loss vs ≥525 expected). 2024 capability Q50
      pinned at ~0.477 in upper wind bins — half-BMU pattern.
      Spec Module 1b MISSES this (Q90 ratio stays normal). B1.5 Q50-ratio
      check should flag it. After Milestone A: slope_pct_q50 = 1.606 → 0.60.
      Second windfarm validated in P-1.2.
      GBP currency — Module 3/6 EUR figures are unreliable until conversion
      lands; Module 5 unaffected.

  - id: 7384
    code: HORNSEA_1
    name: Hornsea 1
    class: high_cf_gbp_offshore_multi_bmu
    rated_mw: 1218.0
    currency: GBP
    generation_units: 3  # T_HOWAO-1, T_HOWAO-2, T_HOWAO-3 (ELEXON BMUs)
    data_range:
      gen_start: 2018-11-01
      gen_end: 2026-05-13
    notes: |
      2024 shows the same half-BMU pattern as EAO — Q50 collapses in
      upper wind bins ([16,17): 0.79, [17,18): 0.64) while Q90 stays
      near normal. Spec Module 1b also misses this. B1.5 needed.
      After Milestone A bug A: slope_pct_q50 SIGN FLIPS — ours +0.679
      (improving) becomes spec -0.605 (significantly degrading, CI
      excludes 0). The single highest-stakes release-note line item.
      Third windfarm validated in P-1.3.

  - id: 7388
    code: ILES_DYEU_ET_DE_NOIRMOUTIER
    name: Iles d'Yeu et de Noirmoutier
    class: edge_case_short_history_eur_offshore
    rated_mw: 496.0
    currency: EUR
    generation_units: 2
    data_range:
      gen_start: 2025-06-25
      gen_end: 2026-05-20
    notes: |
      Edge case — recently commissioned French offshore. ~11 months of data,
      well under the 2*8760 = 17,520 hour threshold needed for
      statsmodels.seasonal_decompose to engage. Tests that Module 5 falls
      back gracefully (no seasonal removal, narrower CI95).
      Module 1b: LOYO needs ≥ 2 years across years → should skip / warn
      cleanly for this windfarm.
      Currency EUR (avoids GBP-side complications).
